name: linting-full

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
      - "charts/**"
      - "mcp-servers/**/*.go"
      - "mcp-servers/**/go.mod"
      - "mcp-servers/**/go.sum"
      - "a2a-agents/**/*.go"
      - "a2a-agents/**/go.mod"
      - "a2a-agents/**/go.sum"
      - "Makefile"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linting-full:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: linting-full
    runs-on: ubuntu-slim
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.2"
          cache-dependency-path: |
            a2a-agents/go/a2a-echo-agent/go.sum
            mcp-servers/go/benchmark-server/go.sum
            mcp-servers/go/fast-time-server/go.sum
            mcp-servers/go/slow-time-server/go.sum

      - name: Install Node.js 22
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl gnupg
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key \
            | sudo gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
          echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_22.x nodistro main" \
            | sudo tee /etc/apt/sources.list.d/nodesource.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y nodejs
          node --version
          npm --version

      - name: Set up Helm
        uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a # v4

      - name: Verify SRI hashes
        run: make sri-verify

      - name: Determine commitlint range
        id: commit_range
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "from=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "to=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            echo "from=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "to=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "from=HEAD~1" >> "$GITHUB_OUTPUT"
            echo "to=HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Run linting-full gates
        run: |
          make --no-print-directory linting-full \
            COMMITLINT_FROM="${{ steps.commit_range.outputs.from }}" \
            COMMITLINT_TO="${{ steps.commit_range.outputs.to }}"
