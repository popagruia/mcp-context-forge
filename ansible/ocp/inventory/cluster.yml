---
# OCP cluster inventory
# Update the values below to match your cluster
#
# Usage:
#   ansible-playbook ansible/ocp/playbooks/setup.yml -i ansible/ocp/inventory/cluster.yml

all:
  hosts:
    localhost:
      ansible_connection: local
      ansible_python_interpreter: "{{ ansible_playbook_python }}"

      # Override defaults for this cluster (optional)
      # ocp_namespace: my-namespace
      # bench_users: 500
      # bench_spawn: 50
